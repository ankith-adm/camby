<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Job Portal</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div style="font-family: Arial, sans-serif;">

    <div id="page1" style="padding:1.5rem;text-align:center;display:flex;justify-content:center;gap:16px;flex-wrap:wrap;">
      <button onclick="showPage('vendor')" class="btn-blue btn-main">Prime Vendor Portals &#9658;</button>
      <button onclick="showPage('jobs')"   class="btn-green btn-main">Job Portals &#9658;</button>
      <button onclick="showPage('linkedin')" class="btn-linkedin btn-main">LinkedIn Directory &#9658;</button>
    </div>

    <div id="page-vendor" style="display:none; padding:1.5rem;">
      <button onclick="goBack()" class="btn-back" style="color:#007BFF;border-color:#007BFF;">&#9664; Back</button>
      <h2 class="page-title">Prime Vendor Portals</h2>
      <div id="vendor-grid" class="grid"></div>
    </div>

    <div id="page-jobs" style="display:none; padding:1.5rem;">
      <button onclick="goBack()" class="btn-back" style="color:#28A745;border-color:#28A745;">&#9664; Back</button>
      <h2 class="page-title">Job Portals</h2>
      <div id="jobs-grid" class="grid"></div>
    </div>

    <div id="page-linkedin" style="display:none; padding:1.5rem;">
      <button onclick="goBack()" class="btn-back" style="color:#0A66C2;border-color:#0A66C2;">&#9664; Back</button>
      <h2 class="page-title">LinkedIn Directory</h2>
      <div id="li-grid" class="grid"></div>
    </div>

  </div>

  <script src="data/vendor.js"></script>
  <script src="data/jobs.js"></script>
  <script src="data/linkedin.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
